name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Review PR #${{ github.event.pull_request.number }} in this repository.
            Use `gh pr diff ${{ github.event.pull_request.number }}` to see the changes.
            Analyze the code for bugs, security issues, code style, and best practices.
            Post your review using `gh pr review ${{ github.event.pull_request.number }}`.
          claude_args: '--allowedTools "Bash(gh pr:*)" "Bash(gh api:*)"'
